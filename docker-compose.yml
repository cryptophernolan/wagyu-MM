# ============================================
# Wagyu MM Bot — Docker Compose (Development)
# Usage: docker-compose up -d
# ============================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: wagyu-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database and logs
      - ./data:/app/data
      - ./logs:/app/logs
      # Mount config (edit without rebuild)
      - ./config/config.yaml:/app/config/config.yaml:ro
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/market_maker.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wagyu-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: wagyu-network
