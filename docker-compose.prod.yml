# ============================================
# Wagyu MM Bot — Docker Compose (Production)
# Usage: docker-compose -f docker-compose.prod.yml up -d
# Differences from dev:
#   - No volume mounts for source code
#   - Pinned image tags (set via IMAGE_TAG env var)
#   - restart: always
#   - Resource limits
# ============================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: wagyu-backend:${IMAGE_TAG:-latest}
    container_name: wagyu-backend
    ports:
      - "8000:8000"
    volumes:
      - wagyu-data:/app/data
      - wagyu-logs:/app/logs
      # Config file must exist on host; copy from config.example.yaml
      - /opt/wagyu/config.yaml:/app/config/config.yaml:ro
    env_file:
      - /opt/wagyu/.env
    environment:
      - DB_PATH=/app/data/market_maker.db
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: wagyu-frontend:${IMAGE_TAG:-latest}
    container_name: wagyu-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  wagyu-data:
    driver: local
  wagyu-logs:
    driver: local

networks:
  default:
    name: wagyu-network
