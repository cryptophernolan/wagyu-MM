exchange:
  api_url: "https://api.hyperliquid.xyz"
  ws_url: "wss://api.hyperliquid.xyz/ws"
  asset: "@260"              # Mainnet: XMR1/USDC spot market
  base_coin: "XMR1"          # Token name for balance lookup
  quote_asset: "USDC"
  price_tick_size: 0.01      # XMR1 price precision (2 decimal places)
  size_step: 0.01            # XMR1 size precision (szDecimals=2)
  kraken_symbol: "XMR/USDT"  # Kraken reference feed for XMR

trading:
  cycle_interval_seconds: 3.0
  order_levels: 3
  level_sizes: [40.0, 60.0, 80.0]     # USDC notional per level (~0.12, 0.18, 0.24 XMR each)

algorithm:
  name: "avellaneda_stoikov"

avellaneda_stoikov:
  gamma_calm: 0.04
  gamma_volatile: 0.08

spread:
  calm_spread_bps: 8.0
  volatile_spread_bps: 25.0
  level_spacing_bps: 4.0

inventory:
  max_position_xmr: 5.0       # max 5 XMR1 (~$1,640 at $328/XMR)
  skew_factor: 0.5
  target_position_xmr: 0.0

risk:
  daily_loss_limit_usdc: 50.0
  max_drawdown_pct: 5.0
  stale_feed_seconds: 5.0

volatility:
  window_minutes: 30
  calm_threshold_bps: 20.0
  volatile_threshold_bps: 35.0

rate_limit:
  # Only refresh orders when fair price moves beyond this threshold (bps).
  # Raised to 25 bps: reduces voluntary refreshes ~5x vs original 5 bps.
  # Hyperliquid cumulative limit: ~2.07 ops/USDC; account is 14%+ over.
  deadband_bps: 25.0
  # Force-refresh at most every 10 minutes when price is flat.
  # Minimises ops/day while still keeping quotes from going completely stale.
  max_refresh_interval_seconds: 600.0
  # Use modify-in-place (saves 50% ops vs cancel+replace). Set false if SDK errors.
  use_order_modify: true
